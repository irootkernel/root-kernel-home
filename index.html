<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <meta content="#fbf6ed" name="theme-color" />
  <link href="/favicon.ico" rel="icon" sizes="any" />
  <link href="/favicon.svg" rel="icon" type="image/svg+xml" />
  <link href="/apple-touch-icon.png" rel="apple-touch-icon" />
  <link href="/site.webmanifest" rel="manifest" />
  <link href="/ko/index.html" rel="canonical" />
  <title>Root Kernel</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fbf6ed;
      --surface: #fffdf8;
      --text: #15202b;
      --muted: #657080;
      --line: #e2d7c7;
      --teal: #11736b;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", Inter, system-ui, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    main {
      width: min(100% - 2rem, 28rem);
      padding: 1.5rem;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 253, 248, .84);
    }

    p {
      margin: 0 0 .75rem;
      color: var(--muted);
      line-height: 1.65;
    }

    a {
      color: var(--teal);
      font-weight: 800;
      text-decoration: none;
    }

    a:focus,
    a:hover {
      text-decoration: underline;
      text-underline-offset: .18em;
    }
  </style>
  <script>
    location.replace("/ko/index.html");
  </script>
  <meta content="0; url=/ko/index.html" http-equiv="refresh" />
</head>
<body>
  <main aria-label="Root Kernel 이동 안내">
    <p>Root Kernel 한국어 페이지로 이동하고 있습니다.</p>
    <a href="/ko/index.html">바로 이동하기</a>
  </main>
</body>
</html>
